# Configuration file for Moodle Analytics Pipeline

# Data processing parameters
data:
  inactivity_threshold_minutes: 30
  max_gap_minutes: 1440  # 24 hours

# Anonymization
anonymization:
  salt: "PhD_Project_2026"

# Model training parameters
model:
  test_size: 0.2
  random_state: 42
  cv_folds: 5

  # Hyperparameter grids
  random_forest:
    n_estimators: [100, 200, 300]
    max_depth: [null, 10, 20]
    min_samples_split: [2, 5, 10]

# Output directories
output:
  processed_data: "data/processed"
  reports: "report"
  shap_dir: "report/shap"

# File paths (relative to project root)
files:
  logs: "data/raw/logs.csv"
  grades: "data/raw/grades.csv"
  session_features: "data/processed/session_features.csv"